name: Release on tag

on:
  workflow_dispatch:
  push:
    tags:
      - '2.*'

jobs:
  read-version:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.read.outputs.version }}
      iteration: ${{ steps.read.outputs.iteration }}
      tag: ${{ steps.read.outputs.tag }}
      sha: ${{ steps.read.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
      - id: read
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -e
          # When triggered by a tag like X.Y.Z-N, derive both VERSION and ITERATION from the tag
          # so that the package filenames and release title match the tag exactly.
          # Falls back to VERSION/ITERATION files for workflow_dispatch and tags without iteration.
          if [ "$REF_TYPE" = "tag" ] && printf '%s' "$REF_NAME" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-[0-9]+$'; then
            VERSION="${REF_NAME%-*}"
            ITERATION="${REF_NAME##*-}"
            TAG="$REF_NAME"
          else
            VERSION=$(cat VERSION | tr -d '[:space:]')
            ITERATION=$(cat ITERATION | tr -d '[:space:]')
            if [ "$REF_TYPE" = "tag" ]; then
              TAG="$REF_NAME"
            else
              TAG="${VERSION}-${ITERATION}"
            fi
          fi
          SHA=$(git rev-parse HEAD)
          echo "Resolved: version=${VERSION} iteration=${ITERATION} tag=${TAG} sha=${SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "iteration=${ITERATION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

  build:
    needs: read-version
    uses: ./.github/workflows/_build.yaml
    with:
      version: ${{ needs.read-version.outputs.version }}
      iteration: ${{ needs.read-version.outputs.iteration }}
      tag: ${{ needs.read-version.outputs.tag }}
      ref: ${{ needs.read-version.outputs.sha }}
    permissions:
      contents: write
